[build]
  command = "pnpm install && pnpm vite build"
  publish = "dist/public"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security Headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Enforce HTTPS for 1 year (Netlify already serves HTTPS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Limit referrer info sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable unused browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy
    # Allows: self, Google Ads/Analytics, Supabase, Google Fonts, Microsoft Clarity
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self' https://awretlrkxzfirbuyaekz.supabase.co https://www.google-analytics.com https://*.clarity.ms;
      img-src 'self' data: https:;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self'
    """

# ── Cache static assets ───────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
